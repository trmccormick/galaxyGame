# PostgreSQL configuration
# IMPORTANT: For Docker-based development, the database host must be set to 'db', not 'localhost'.
# This is required for container-to-container networking. See docs/agent/rules/ENVIRONMENT_BOUNDARIES.md
# and docs/agent/README.md for details on environment boundaries and agent rules.
#
# If you change this, you may break local development in Docker. Do not set host: localhost!
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch('RAILS_MAX_THREADS') { 5 } %>

development:
  <<: *default
  database: galaxy_game_development
  host: db
  username: postgres
  password: password

# Test database - MUST be separate from development
# Explicitly set to ignore DATABASE_URL
test:
  <<: *default
  database: galaxy_game_test
  host: db
  username: postgres
  password: password

production:
  <<: *default
  database: galaxy_game_production
  username: galaxy_game
  password: <%= ENV['GALAXY_GAME_DATABASE_PASSWORD'] %>
